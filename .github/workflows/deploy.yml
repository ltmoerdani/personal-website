name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ltmoerdani
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash /home/ltmoerdani/deploy.sh
